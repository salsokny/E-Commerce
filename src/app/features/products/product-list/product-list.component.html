<div class="w-full max-w-7xl mx-auto px-4 py-4 sm:py-4 lg:py-4">
  <div class="relative min-h-[500px]">
    <!-- Loading Overlay -->
    <div
      *ngIf="loading$ | async"
      class="absolute top-[50%] left-1/2 -translate-x-1/2 z-10"
    >
      <div
        class="w-12 h-12 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"
      ></div>
    </div>

    <!-- Products -->
    <div
      class="grid gap-4 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 2xl:grid-cols-5"
    >
      <app-product-card
        *ngFor="let product of products$ | async"
        [product]="product"
      ></app-product-card>
    </div>
  </div>
</div>
