<div
  class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow hover:shadow-lg hover:-translate-y-1 transition transform"
>
  <div
    class="w-full h-48 bg-gray-100 overflow-hidden cursor-pointer hover:opacity-90 transition"
    [routerLink]="['/products', product.id]"
  >
    <img
      [src]="product.image"
      [alt]="product.name"
      class="w-full h-full object-cover hover:scale-105 transition"
    />
  </div>

  <div class="p-4">
    <h3
      class="font-semibold text-lg mb-2 text-gray-800 truncate cursor-pointer hover:text-blue-500 transition"
      [routerLink]="['/products', product.id]"
    >
      {{ product.name }}
    </h3>
    <p class="text-gray-600 text-sm mb-2 line-clamp-2">
      {{ product.description }}
    </p>

    <div class="flex gap-2 mb-3 flex-wrap">
      <span
        class="bg-gray-200 text-gray-800 px-2 py-1 rounded-lg text-xs font-semibold"
        >{{ product.category }}</span
      >
    </div>

    <div
      class="flex justify-between items-center mb-4 pb-3 border-b border-gray-200"
    >
      <span class="text-xl font-bold text-green-600">${{ product.price }}</span>
      <span
        [ngClass]="product.stock > 0 ? 'text-green-600' : 'text-red-600'"
        class="text-sm font-semibold"
      >
        {{ product.stock > 0 ? "In Stock" : "Out of Stock" }}
      </span>
    </div>

    <button
      (click)="addToCart()"
      [disabled]="product.stock === 0"
      class="w-full px-4 py-2 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed transition mb-2"
    >
      Add to Cart
    </button>
    <button
      [routerLink]="['/products', product.id]"
      class="w-full px-4 py-2 border-2 border-gray-300 text-gray-800 font-semibold rounded-lg hover:bg-gray-100 transition"
    >
      View Details
    </button>
  </div>
</div>
