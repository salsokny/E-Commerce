<div class="mx-auto max-w-7xl px-4 py-8">
  <h1 class="mb-8 text-3xl font-bold text-slate-800">Shopping Cart</h1>

  <div
    class="grid gap-8 lg:grid-cols-[1fr_350px]"
    *ngIf="(cartItems$ | async)?.length; else emptyCart"
  >
    <div class="overflow-hidden rounded-lg bg-white shadow-md">
      <div
        class="hidden grid-cols-[2fr_1fr_1fr_1fr_50px] gap-4 border-b-2 border-gray-200 bg-gray-50 p-4 font-semibold text-slate-800 md:grid"
      >
        <span>Product</span>
        <span>Price</span>
        <span>Quantity</span>
        <span>Total</span>
        <span></span>
      </div>

      <div
        class="grid gap-3 border-b border-gray-200 p-4 last:border-b-0 md:grid-cols-[2fr_1fr_1fr_1fr_50px] md:items-center md:gap-4"
        *ngFor="let item of cartItems$ | async"
      >
        <div class="flex items-center gap-4">
          <img
            [src]="item.product.image"
            [alt]="item.product.name"
            class="h-20 w-20 rounded object-cover"
          />
          <span class="font-medium text-slate-800">{{
            item.product.name
          }}</span>
        </div>
        <span
          class="font-semibold text-green-600 before:font-bold before:text-slate-800 before:content-['Price:_'] md:before:content-none"
        >
          ${{ item.product.price }}
        </span>
        <div
          class="flex items-center gap-2 before:font-bold before:text-slate-800 before:content-['Quantity:_'] md:before:content-none"
        >
          <button
            class="h-8 w-8 rounded border border-gray-300 bg-white font-bold transition hover:bg-gray-100"
            (click)="updateQuantity(item.product.id, item.quantity - 1)"
          >
            -
          </button>
          <input
            type="number"
            [(ngModel)]="item.quantity"
            (change)="updateQuantity(item.product.id, item.quantity)"
            class="w-12 rounded border border-gray-300 p-1 text-center"
          />
          <button
            class="h-8 w-8 rounded-lg border border-gray-300 bg-white font-bold transition hover:bg-gray-100"
            (click)="updateQuantity(item.product.id, item.quantity + 1)"
          >
            +
          </button>
        </div>
        <span
          class="font-semibold text-green-600 before:font-bold before:text-slate-800 before:content-['Total:_'] md:before:content-none"
        >
          ${{ item.product.price * item.quantity }}
        </span>
        <button
          class="flex h-8 w-8 items-center justify-center rounded-lg bg-red-500 text-white transition hover:bg-red-700"
          (click)="removeItem(item.product.id)"
        >
          ✕
        </button>
      </div>
    </div>

    <div class="h-fit rounded-lg bg-white p-6 shadow-md lg:sticky lg:top-24">
      <h2 class="mb-4 text-xl font-bold text-slate-800">Order Summary</h2>
      <div class="mb-3 flex justify-between text-gray-500">
        <span>Subtotal:</span>
        <span>${{ cartTotal$ | async }}</span>
      </div>
      <div class="mb-3 flex justify-between text-gray-500">
        <span>Shipping:</span>
        <span>Free</span>
      </div>
      <div
        class="mt-3 flex justify-between border-t-2 border-gray-200 pt-3 text-lg font-bold text-slate-800"
      >
        <span>Total:</span>
        <span>${{ cartTotal$ | async }}</span>
      </div>

      <button
        class="mt-4 w-full rounded-lg bg-green-600 px-4 py-2 font-semibold text-white transition hover:bg-green-700"
        (click)="checkout()"
      >
        Proceed to Checkout
      </button>
      <button
        class="mt-4 w-full rounded-lg bg-blue-500 px-4 py-2 font-semibold text-white transition hover:bg-blue-600"
        (click)="continueShopping()"
      >
        Continue Shopping
      </button>
      <button
        class="mt-4 w-full rounded-lg bg-red-500 px-4 py-2 font-semibold text-white transition hover:bg-red-700"
        (click)="clearCart()"
      >
        Clear Cart
      </button>
    </div>
  </div>

  <ng-template #emptyCart>
    <div class="rounded-lg bg-white px-4 py-16 text-center shadow-md">
      <p class="mb-8 text-xl text-gray-500">Your cart is empty</p>
      <button
        class="rounded bg-blue-500 px-8 py-3 font-semibold text-white transition hover:bg-blue-600"
        (click)="continueShopping()"
      >
        Continue Shopping
      </button>
    </div>
  </ng-template>
</div>
